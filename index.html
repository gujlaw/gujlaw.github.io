<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Reader - English to Gujarati Auto Translate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .source-selector {
            flex: 1;
            min-width: 250px;
        }

        .source-selector select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .source-selector select:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }

        .translate-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .translate-toggle:hover {
            border-color: #667eea;
        }

        .translate-toggle.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background: #ccc;
            border-radius: 12px;
            transition: all 0.3s;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }

        .translate-toggle.active .toggle-switch {
            background: #4caf50;
        }

        .translate-toggle.active .toggle-switch::after {
            left: 28px;
        }

        .refresh-btn {
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .refresh-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .feed-container {
            padding: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .feed-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .feed-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-color: #667eea;
        }

        .feed-source {
            font-size: 0.85em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .feed-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .feed-content {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .feed-date {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 15px;
        }

        .feed-link {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s;
            text-align: center;
            font-weight: 500;
        }

        .feed-link:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
        }

        .error-message {
            text-align: center;
            padding: 50px;
            color: #dc3545;
            font-size: 1.2em;
        }

        .translate-indicator {
            display: inline-block;
            padding: 3px 8px;
            background: #4caf50;
            color: white;
            border-radius: 5px;
            font-size: 0.75em;
            margin-left: 10px;
        }

        @media (max-width: 768px) {
            .feed-container {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 ફીડ રીડર</h1>
            <p>English to Gujarati Auto Translate Feed Reader</p>
        </div>
        
        <div class="controls">
            <div class="source-selector">
                <select id="feedSource">
                    <optgroup label="Legal News (English)">
                        <option value="https://api.allorigins.win/raw?url=https://www.livelaw.in/google_feeds.xml">Live Law</option>
                        <option value="https://api.allorigins.win/raw?url=https://lawbeat.in/google_feeds.xml">Law Beat</option>
                        <option value="https://api.allorigins.win/raw?url=https://www.barandbench.com/feed/">Bar & Bench</option>
                        <option value="https://api.allorigins.win/raw?url=https://www.scconline.com/blog/feed/">SCC Times</option>
                    </optgroup>
                    <optgroup label="English News">
                        <option value="https://api.allorigins.win/raw?url=https://www.thehindu.com/news/national/feeder/default.rss">The Hindu - National</option>
                    </optgroup>
                    <optgroup label="Divya Bhaskar (Gujarati)">
                        <option value="https://api.allorigins.win/raw?url=https://www.divyabhaskar.co.in/rss-v1--category-1037.xml">ઈન્ડિયા | દિવ્ય ભાસ્કર</option>
                        <option value="https://api.allorigins.win/raw?url=https://www.divyabhaskar.co.in/rss-v1--category-970.xml">સ્પોર્ટ્સ | દિવ્ય ભાસ્કર</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="translate-toggle active" id="translateToggle" onclick="toggleTranslation()">
                <span>Auto Translate</span>
                <div class="toggle-switch"></div>
                <span>EN → ગુ</span>
            </div>
            
            <button class="refresh-btn" onclick="loadFeed()">
                🔄 Refresh Feed
            </button>
        </div>
        
        <div id="feedContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading feed...</p>
            </div>
        </div>
    </div>

    <script>
        let autoTranslate = true;
        let currentFeed = null;

        // Toggle translation
        function toggleTranslation() {
            autoTranslate = !autoTranslate;
            const toggle = document.getElementById('translateToggle');
            if (autoTranslate) {
                toggle.classList.add('active');
            } else {
                toggle.classList.remove('active');
            }
            // Reload feed with new translation setting
            if (currentFeed) {
                displayFeed(currentFeed);
            }
        }

        // Load RSS feed
        async function loadFeed() {
            const feedContent = document.getElementById('feedContent');
            feedContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading feed...</p>
                </div>
            `;

            const feedUrl = document.getElementById('feedSource').value;

            try {
                const response = await fetch(feedUrl);
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                // Check if it's RSS or Atom feed
                const items = xmlDoc.querySelectorAll('item') || xmlDoc.querySelectorAll('entry');
                
                if (items.length === 0) {
                    throw new Error('No feed items found');
                }

                const feedData = {
                    title: xmlDoc.querySelector('channel > title')?.textContent || 
                           xmlDoc.querySelector('feed > title')?.textContent || 'Feed',
                    items: []
                };

                items.forEach(item => {
                    const title = item.querySelector('title')?.textContent || 'No title';
                    const link = item.querySelector('link')?.textContent || 
                                item.querySelector('link')?.getAttribute('href') || '#';
                    const description = item.querySelector('description')?.textContent || 
                                      item.querySelector('summary')?.textContent || 
                                      item.querySelector('content')?.textContent || '';
                    const pubDate = item.querySelector('pubDate')?.textContent || 
                                   item.querySelector('published')?.textContent || 
                                   item.querySelector('updated')?.textContent || '';
                    
                    // Clean HTML tags from description
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = description;
                    const cleanDescription = tempDiv.textContent || tempDiv.innerText || '';
                    
                    feedData.items.push({
                        title: title,
                        link: link,
                        description: cleanDescription.substring(0, 300) + '...',
                        pubDate: pubDate
                    });
                });

                currentFeed = feedData;
                displayFeed(feedData);

            } catch (error) {
                console.error('Error loading feed:', error);
                feedContent.innerHTML = `
                    <div class="error-message">
                        <p>❌ Error loading feed</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">${error.message}</p>
                        <p style="font-size: 0.8em; margin-top: 10px; color: #666;">Try refreshing or selecting a different source</p>
                    </div>
                `;
            }
        }

        // Translate text using Google Translate API (unofficial)
        async function translateToGujarati(text) {
            if (!text || !autoTranslate) return text;
            
            try {
                // Using Google Translate unofficial API
                const response = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=gu&dt=t&q=${encodeURIComponent(text)}`);
                const data = await response.json();
                
                if (data && data[0] && data[0][0] && data[0][0][0]) {
                    return data[0][0][0];
                }
                return text;
            } catch (error) {
                console.error('Translation error:', error);
                return text;
            }
        }

        // Display feed items
        async function displayFeed(feedData) {
            const feedContent = document.getElementById('feedContent');
            
            // Show only first 12 items
            const items = feedData.items.slice(0, 12);
            
            // Create feed cards HTML
            let html = '<div class="feed-container">';
            
            for (const item of items) {
                let title = item.title;
                let description = item.description;
                
                if (autoTranslate) {
                    title = await translateToGujarati(title);
                    description = await translateToGujarati(description);
                }
                
                const date = item.pubDate ? new Date(item.pubDate).toLocaleDateString('gu-IN', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                }) : '';
                
                html += `
                    <div class="feed-card">
                        <div class="feed-source">
                            ${feedData.title}
                            ${autoTranslate ? '<span class="translate-indicator">અનુવાદિત</span>' : ''}
                        </div>
                        <div class="feed-title">${title}</div>
                        <div class="feed-content">${description}</div>
                        ${date ? `<div class="feed-date">📅 ${date}</div>` : ''}
                        <a href="${item.link}" target="_blank" class="feed-link">
                            ${autoTranslate ? 'વધુ વાંચો' : 'Read More'} →
                        </a>
                    </div>
                `;
            }
            
            html += '</div>';
            feedContent.innerHTML = html;
        }

        // Initial load
        loadFeed();

        // Reload feed when source changes
        document.getElementById('feedSource').addEventListener('change', loadFeed);
    </script>
</body>
</html>
